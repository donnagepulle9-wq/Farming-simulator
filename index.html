<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Harvest Haven - A relaxing browser-based farming simulator">
    <title>Harvest Haven</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Main Game Canvas -->
        <div id="gameContainer" class="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <!-- Mobile Touch Joystick -->
            <div id="joystickContainer" class="joystick-container hidden">
                <div id="joystick" class="joystick">
                    <div class="joystick-bg"></div>
                    <div id="joystickStick" class="joystick-stick"></div>
                </div>
            </div>

            <!-- Loading Screen -->
            <div id="loadingScreen" class="loading-screen">
                <div class="loading-content">
                    <div class="loading-spinner"></div>
                    <p class="loading-text">Preparing your farm...</p>
                    <div class="loading-tips">Tip: Water crops daily to maximize growth!</div>
                </div>
            </div>
        </div>

        <!-- UI Layer -->
        <div id="uiLayer" class="ui-layer">
            <!-- Main Menu -->
            <div id="mainMenu" class="main-menu">
                <div class="menu-container">
                    <div class="menu-logo">🌾</div>
                    <h1 class="menu-title">Harvest Haven</h1>
                    <div class="menu-buttons">
                        <button class="menu-btn" id="newGameBtn">New Game</button>
                        <button class="menu-btn" id="continueBtn">Continue</button>
                        <button class="menu-btn" id="saveSlotsBtn">Save Slots</button>
                        <button class="menu-btn" id="settingsBtn">Settings</button>
                        <button class="menu-btn" id="creditsBtn">Credits</button>
                    </div>
                </div>
            </div>

            <!-- HUD -->
            <div id="hud" class="hud hidden">
                <div class="hud-left">
                    <div class="hud-item">
                        <span class="hud-label">💰</span>
                        <span id="goldDisplay" class="hud-value">100</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">⭐</span>
                        <span id="levelDisplay" class="hud-value">1</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">📅</span>
                        <span id="dayDisplay" class="hud-value">1</span>
                    </div>
                </div>

                <div class="hud-center">
                    <div class="time-display">
                        <span id="timeDisplay" class="time-value">06:00</span>
                        <div id="weatherIcon" class="weather-icon">☀️</div>
                    </div>
                </div>

                <div class="hud-right">
                    <div class="hud-item">
                        <span class="hud-label">⚡</span>
                        <div class="energy-bar">
                            <div id="energyBar" class="energy-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div id="toolbar" class="toolbar hidden">
                <button class="toolbar-btn" id="inventoryBtn" title="Inventory (I)">
                    <span class="btn-icon">🎒</span>
                </button>
                <button class="toolbar-btn" id="shopBtn" title="Shop (S)">
                    <span class="btn-icon">🏪</span>
                </button>
                <button class="toolbar-btn" id="questsBtn" title="Quests (Q)">
                    <span class="btn-icon">📜</span>
                </button>
                <button class="toolbar-btn" id="achievementsBtn" title="Achievements (A)">
                    <span class="btn-icon">🏆</span>
                </button>
                <button class="toolbar-btn" id="statsBtn" title="Statistics (T)">
                    <span class="btn-icon">📊</span>
                </button>
                <button class="toolbar-btn" id="mapBtn" title="Map (M)">
                    <span class="btn-icon">🗺️</span>
                </button>
                <button class="toolbar-btn" id="pauseBtn" title="Pause (ESC)">
                    <span class="btn-icon">⏸️</span>
                </button>
            </div>

            <!-- Hotbar -->
            <div id="hotbar" class="hotbar hidden">
                <div id="hotbarItems" class="hotbar-items"></div>
            </div>

            <!-- Notification Stack -->
            <div id="notificationStack" class="notification-stack"></div>

            <!-- Dialogue Box -->
            <div id="dialogueBox" class="dialogue-box hidden">
                <div class="dialogue-header">
                    <span id="dialogueSpeaker" class="dialogue-speaker"></span>
                    <button class="dialogue-close" id="dialogueClose">×</button>
                </div>
                <div class="dialogue-content">
                    <p id="dialogueText" class="dialogue-text"></p>
                </div>
                <div class="dialogue-choices" id="dialogueChoices"></div>
            </div>

            <!-- Modal -->
            <div id="modal" class="modal hidden">
                <div class="modal-overlay"></div>
                <div class="modal-content">
                    <button class="modal-close" id="modalClose">×</button>
                    <div id="modalBody" class="modal-body"></div>
                </div>
            </div>

            <!-- Tutorial Overlay -->
            <div id="tutorialOverlay" class="tutorial-overlay hidden">
                <div class="tutorial-content">
                    <div class="tutorial-header">
                        <h2>Welcome to Harvest Haven!</h2>
                        <button class="tutorial-close" id="tutorialClose">Skip</button>
                    </div>
                    <div id="tutorialBody" class="tutorial-body"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config/gameConfig.js"></script>
    <script src="js/config/audioConfig.js"></script>
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/logger.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/systems/eventSystem.js"></script>
    <script src="js/systems/saveSystem.js"></script>
    <script src="js/systems/inputSystem.js"></script>
    <script src="js/systems/audioSystem.js"></script>
    <script src="js/systems/particleSystem.js"></script>
    <script src="js/systems/animationSystem.js"></script>
    <script src="js/world/camera.js"></script>
    <script src="js/world/weather.js"></script>
    <script src="js/world/timeSystem.js"></script>
    <script src="js/world/world.js"></script>
    <script src="js/player/player.js"></script>
    <script src="js/items/itemManager.js"></script>
    <script src="js/farming/cropManager.js"></script>
    <script src="js/farming/gardenPlot.js"></script>
    <script src="js/farming/harvest.js"></script>
    <script src="js/farming/craftingSystem.js"></script>
    <script src="js/economy/shop.js"></script>
    <script src="js/economy/economy.js"></script>
    <script src="js/npcs/npc.js"></script>
    <script src="js/npcs/npcManager.js"></script>
    <script src="js/animals/animal.js"></script>
    <script src="js/animals/animalManager.js"></script>
    <script src="js/gameplay/questSystem.js"></script>
    <script src="js/gameplay/achievementSystem.js"></script>
    <script src="js/gameplay/collectionBook.js"></script>
    <script src="js/ui/uiManager.js"></script>
    <script src="js/ui/modals.js"></script>
    <script src="js/ui/tutorial.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
